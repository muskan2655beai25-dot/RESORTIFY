<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="thankyou.css">

            <!-- yaha pe nbsp denote krta hai ki there is a gap between thank and you , ye flex ke logic ko ignore krta hai and still gap show krta h jo by default nhi hota due to flex containers  -->

            <p class="sub-text">Your feedback helps us make your next stay even more magical.</p>
            
            <a href="index.html" class="btn-home">RETURN TO LOBBY</a>
        </div>

        <footer class="creator-credit">
            <p>Designed & Developed with ❤️ by <span>Garima Singh and Muskan Singla</span></p>
        </div>
