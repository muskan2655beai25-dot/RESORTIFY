<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Your Story | Resortify</title>
    <link rel="stylesheet" href="experiences.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="glass-container" id="main-container">
        <header class="review-header">
            <a href="index.html" class="back-home">‹ BACK TO LUXURY</a>
            <h1>How was your stay at <br><span>Resortify</span></h1>
            <p id="sub-header-text">Your memories are the threads that weave the Resortify legacy.</p>
        </header>

        <form class="review-form" id="experience-form">
            <div class="rating-box">
                <p id="rating-desc">Rate your experience</p>
                <div class="stars" id="star-container">
                    <input type="radio" name="star" id="star5" value="5"><label for="star5" class="fa-solid fa-star"></label>
                    <input type="radio" name="star" id="star4" value="4"><label for="star4" class="fa-solid fa-star"></label>
                    <input type="radio" name="star" id="star3" value="3"><label for="star3" class="fa-solid fa-star"></label>
                    <input type="radio" name="star" id="star2" value="2"><label for="star2" class="fa-solid fa-star"></label>
                    <input type="radio" name="star" id="star1" value="1"><label for="star1" class="fa-solid fa-star"></label>
                </div>
            </div>

            <div class="input-group">
                <textarea id="review-text" placeholder="Tell us about the moments that took your breath away..." required></textarea>
                <div class="line"></div>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <input type="text" id="user-name" placeholder="Your Name" required>
                    <div class="line"></div>
                </div>
                <div class="input-group">
                    <input type="email" id="user-email" placeholder="Email Address" required>
                    <div class="line"></div>
                </div>
            </div>
        
            <button type="submit" class="submit-btn" id="post-btn">
                <span>POST REVIEW</span>
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </form>
    </div>

    <div class="bg-decoration">
        <div class="circle c1"></div>
        <div class="circle c2"></div>
    </div>

    <script src="experiences.js"></script>
</body>
</html>
